name: Release

# タグ (vX.Y.Z) を push すると、各プラットフォーム/アーキ向けに
# 配布物をビルドして GitHub Release（下書き）へ添付します。
#
#   Windows x64   : NSIS(.exe) / MSI(.msi) / ポータブル(.exe)
#   Windows ARM64 : NSIS(.exe) / ポータブル(.exe)
#   macOS (univ)  : .app / .dmg (Intel + Apple Silicon)
#   Linux  x64    : .deb / .AppImage
#   Linux  ARM64  : .deb / .AppImage
# 署名付きなら latest.json も生成し、アプリ内自動アップデートに使う。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: "nsis,msi"
            portable_name: "Cue_portable_x64.exe"
          - name: windows-arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: "nsis"
            portable_name: "Cue_portable_arm64.exe"
          - name: macos-universal
            runner: macos-latest
            target: universal-apple-darwin
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            bundles: "app,dmg"
          - name: linux-x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: "deb,appimage"
          - name: linux-arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: "deb,appimage"

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file libssl-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets || matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build & upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 自動アップデート用の署名。空パスワードは秘密でないのでリテラルで。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Cue ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # ---- ポータブル版（インストーラ不要の単体 exe） ----
      - name: Upload portable executable
        if: ${{ matrix.portable_name != '' && startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Copy-Item "src-tauri/target/${{ matrix.target }}/release/cue.exe" "${{ matrix.portable_name }}"
          gh release upload ${{ github.ref_name }} "${{ matrix.portable_name }}" --clobber

  # 全ビルド完了後: (1) アセット名を OS 付きに統一、(2) 自動アップデート用 latest.json を生成。
  #   命名: Cue_<version>_<os>_<arch>[_<kind>].<ext>（os は拡張子から判定）
  rename-assets:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Normalize asset names to include the OS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"

          # 下書きリリースは tags エンドポイントで引けないことがあるため一覧から探す。
          REL_ID=$(gh api --paginate "repos/$REPO/releases" \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -n1)
          if [ -z "$REL_ID" ]; then
            echo "::error::release for $TAG not found"; exit 1
          fi

          normalize() {
            local n="$1" low ext os arch kind
            # .sig は元アセットを正規化して .sig を付け直す（署名と本体の名前を対応させる）。
            case "$n" in
              *.sig)
                local base nb
                base="${n%.sig}"
                nb=$(normalize "$base")
                [ -n "$nb" ] && printf '%s.sig' "$nb"
                return ;;
            esac
            low=$(printf '%s' "$n" | tr '[:upper:]' '[:lower:]')

            case "$low" in
              *.app.tar.gz) ext="app.tar.gz" ;;
              *) ext="${n##*.}" ;;
            esac

            case "$low" in
              *.deb|*.appimage|*.rpm) os="linux" ;;
              *.dmg|*.app.tar.gz)     os="macos" ;;
              *.exe|*.msi)            os="windows" ;;
              *) printf ''; return ;;            # 対象外は触らない
            esac

            if   [[ "$low" == *aarch64* || "$low" == *arm64* ]]; then arch="arm64"
            elif [[ "$low" == *x86_64* || "$low" == *amd64* || "$low" == *x64* ]]; then arch="x64"
            elif [[ "$low" == *universal* ]]; then arch="universal"
            else arch=""
            fi

            if   [[ "$low" == *portable* ]]; then kind="portable"
            elif [[ "$ext" == "exe" && "$low" == *setup* ]]; then kind="setup"
            else kind=""
            fi

            local out="Cue_${VER}_${os}"
            [ -n "$arch" ] && out="${out}_${arch}"
            [ -n "$kind" ] && out="${out}_${kind}"
            printf '%s.%s' "$out" "$ext"
          }

          # 1) アセット名を OS 付きに統一（.sig も一緒に揃える）
          gh api --paginate "repos/$REPO/releases/$REL_ID/assets" \
            --jq '.[] | "\(.id)\t\(.name)"' | while IFS=$'\t' read -r id name; do
            new=$(normalize "$name")
            if [ -n "$new" ] && [ "$new" != "$name" ]; then
              echo "rename: $name -> $new"
              gh api -X PATCH "repos/$REPO/releases/assets/$id" -f name="$new" >/dev/null
            else
              echo "keep:   $name"
            fi
          done

          # 2) 自動アップデート用 latest.json を全プラットフォームまとめて生成（リネーム後の名前で参照）
          BASE="https://github.com/$REPO/releases/download/$TAG"
          gh api --paginate "repos/$REPO/releases/$REL_ID/assets" \
            --jq '.[] | "\(.name)\t\(.id)"' > /tmp/assets.tsv
          sig_of() { # $1=本体名 → <本体>.sig の中身（無ければ空）
            local sid
            sid=$(awk -F'\t' -v n="$1.sig" '$1==n{print $2; exit}' /tmp/assets.tsv)
            [ -z "$sid" ] && return 0
            gh api "repos/$REPO/releases/assets/$sid" -H "Accept: application/octet-stream" || true
          }
          platforms='{}'
          add() { # $1=プラットフォーム $2=本体名
            local sig; sig=$(sig_of "$2")
            if [ -z "$sig" ]; then echo "skip $1: no $2.sig"; return 0; fi
            platforms=$(jq -c --arg k "$1" --arg u "$BASE/$2" --arg s "$sig" \
              '. + {($k): {signature:$s, url:$u}}' <<<"$platforms")
            echo "add  $1"
          }
          add windows-x86_64  "Cue_${VER}_windows_x64_setup.exe"
          add windows-aarch64 "Cue_${VER}_windows_arm64_setup.exe"
          add darwin-x86_64   "Cue_${VER}_macos_universal.app.tar.gz"
          add darwin-aarch64  "Cue_${VER}_macos_universal.app.tar.gz"
          add linux-x86_64    "Cue_${VER}_linux_x64.AppImage"
          add linux-aarch64   "Cue_${VER}_linux_arm64.AppImage"

          if [ "$platforms" = "{}" ]; then
            echo "::warning::no signed updater artifacts found; latest.json not created"
          else
            PUB=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            jq -n --arg v "$VER" --arg d "$PUB" --argjson p "$platforms" \
              '{version:$v, pub_date:$d, platforms:$p}' > latest.json
            echo "latest.json platforms:"; jq -r '.platforms | keys[]' latest.json
            gh release upload "$TAG" latest.json --clobber --repo "$REPO"
          fi
